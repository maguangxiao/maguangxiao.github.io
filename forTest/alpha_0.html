<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>半屏透明测试 | WKWebView 透传验证</title>
    <style>
        /* 彻底清除所有边距，确保背景完全透明 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* html与body均设为透明背景，无任何默认底色 */
        html, body {
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            /* 确保没有任何背景图像或颜色覆盖 */
            background: transparent !important;
        }
    </style>
</head>
<body>

</body>
</html>
